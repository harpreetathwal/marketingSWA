<!doctype html>
<html lang="en" class="splash-active">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a09">
  <meta name="description" content="Creative direction, visual storytelling, and new ways to work together.">
  <title>Make Something Unforgettable</title>
  <link rel="stylesheet" href="landing.css">
  <script src="landing.js" defer></script>
</head>
<body>
  <div class="splash" id="splash" role="dialog" aria-label="Intro film" aria-modal="true">
    <video id="splash-video" class="splash-video" autoplay muted playsinline preload="auto" aria-label="Introduction video">
      <source src="https://marketingdevwus2stor.blob.core.windows.net/video-content/hiring/splash.webm" type="video/webm">
      <source src="https://marketingdevwus2stor.blob.core.windows.net/video-content/hiring/splash.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="splash-shade" aria-hidden="true"></div>
    <div class="splash-brand" aria-hidden="true"><span>Creative</span><span>Direction</span></div>
    <p class="splash-hint">Click anywhere to enter</p>
    <button class="skip-video" id="skip-video" type="button">Skip video <span aria-hidden="true">↗</span></button>
    <div class="splash-progress" aria-hidden="true"><span></span></div>
  </div>

  <div class="landing" id="landing" aria-hidden="true">
    <main class="simple-landing" id="options">
      <h1 class="sr-only">Choose what you would like to do</h1>
      <div class="option-grid">
        <a class="option-card option-card--ad" href="hire.html" aria-describedby="ad-subtitle">
          <span class="option-title">I Need an Ad</span>
          <span class="option-subtitle" id="ad-subtitle" data-rotating-subtitle>Make Me Unforgettable</span>
          <span class="option-arrow" aria-hidden="true">&rarr;</span>
        </a>

        <a class="option-card option-card--internship" href="internship.html" aria-describedby="internship-subtitle">
          <span class="option-title">I Want an Internship</span>
          <span class="option-subtitle" id="internship-subtitle" data-rotating-subtitle>I Want to Learn Video Editing</span>
          <span class="option-arrow" aria-hidden="true">&rarr;</span>
        </a>

        <a class="option-card option-card--contact" href="contact.html">
          <span class="option-title">Contact Us</span>
          <span class="option-arrow" aria-hidden="true">&rarr;</span>
        </a>

        <a class="option-card option-card--gallery" href="gallery.html">
          <span class="option-title">Gallery</span>
          <span class="option-arrow" aria-hidden="true">&rarr;</span>
        </a>
      </div>
      <p class="font-credit">Infini, Sandrine Nugue / CNAP</p>
    </main>
  </div>
</body>
</html>
