# Docs: https://github.com/Azure/functions-action

name: Build and deploy API - marketing-dev-wus2-api

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'

concurrency:
  group: marketing-dev-wus2-api-production
  cancel-in-progress: true

env:
  AZURE_FUNCTIONAPP_NAME: marketing-dev-wus2-api
  AZURE_FUNCTIONAPP_PACKAGE_PATH: api
  NODE_VERSION: '22.x'

jobs:
  build:
    name: Build and test API
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}/package-lock.json

      - name: Install locked dependencies
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: npm ci

      - name: Run API tests
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: npm test

      - name: Remove development-only dependencies
        working-directory: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        run: npm prune --omit=dev

      - name: Create deployment package
        shell: bash
        run: |
          cd "${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}"
          zip -r ../release.zip . \
            -x 'test/*' \
               'local.settings.json' \
               'local.settings.example.json' \
               'README.md' \
               '.funcignore'

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: marketing-api-package
          path: release.zip
          if-no-files-found: error
          retention-days: 1

  deploy:
    name: Deploy API to Azure
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: marketing-api-package

      - name: Extract deployment package
        shell: bash
        run: |
          mkdir api-package
          unzip -q release.zip -d api-package

